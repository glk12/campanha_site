{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar exclusão</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body>
<section class="bg-gray-50 p-3 sm:p-5 antialiased min-h-screen">
    <div class="mx-auto max-w-screen-md px-4 lg:px-12">
        <div class="bg-white relative shadow-md sm:rounded-lg overflow-hidden p-6 sm:p-8">
            <h1 class="text-xl font-semibold text-gray-900">Confirmar exclusão</h1>
            <p class="mt-2 text-sm text-gray-600">
                Tem certeza que deseja excluir <span class="font-semibold text-gray-900">{{ person.full_name }}</span>?
            </p>
            <p class="mt-1 text-sm text-gray-500">Esta ação não pode ser desfeita.</p>

            <form method="post" class="mt-6 flex items-center gap-3">
                {% csrf_token %}
                <button type="submit" class="inline-flex items-center rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-300">
                    Excluir
                </button>
                <a href="{% url 'person_list' %}" class="inline-flex items-center rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-900 hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-gray-200">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</section>
</body>
</html>
